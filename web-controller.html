<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Bot Web Controller</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; padding:24px; }
    .container { max-width:520px; margin:0 auto; }
    h1 { text-align:center; }
    .panel { background:#1f1f1f; border-radius:16px; padding:18px; margin-top:16px; }
    label { display:block; margin:12px 0 6px; }
    .joystick-wrapper { position:relative; width:100%; padding-top:100%; margin:20px 0; }
    .joystick { position:absolute; top:0; left:0; right:0; bottom:0; border: 3px solid #444; border-radius:50%; background: radial-gradient(circle at center, #2a2a2a 0%, #121212 70%); touch-action:none; }
    .handle { position:absolute; width:96px; height:96px; border-radius:50%; background:#2979ff; border:3px solid #fff; transform:translate(-50%, -50%); left:50%; top:50%; box-shadow:0 0 20px rgba(41,121,255,0.4); }
    .actions { display:flex; gap:12px; margin-top:16px; }
    button { flex:1; padding:14px; border:none; border-radius:10px; background:#2979ff; color:#fff; font-size:16px; cursor:pointer; }
    button:active { background:#1b58bf; }
    .status { text-align:center; margin-top:16px; font-size:14px; color:#bbb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Battle Bot Web Controller</h1>
    <div class="panel">
      <div class="joystick-wrapper">
        <div id="joystick" class="joystick">
          <div id="handle" class="handle"></div>
        </div>
      </div>
      <div class="actions">
        <button id="emojiBtn">Emoji Face</button>
        <button id="danceBtn">Dance</button>
      </div>
      <div class="status" id="status">Open this page from the robot's WiFi network.</div>
    </div>
  </div>
  <script>
    const joystick = document.getElementById('joystick');
    const handle = document.getElementById('handle');
    const emojiBtn = document.getElementById('emojiBtn');
    const danceBtn = document.getElementById('danceBtn');
    const status = document.getElementById('status');
    const size = 520;
    const center = 0.5;
    const maxRadius = 190;
    let active = false;
    let pointerId = null;
    let xValue = 2048;
    let yValue = 2048;
    let emoji = 0;
    let dance = 0;
    let lastSendTime = 0;

    function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }
    function setHandle(dx, dy) {
      handle.style.left = `${50 + dx}%`;
      handle.style.top = `${50 + dy}%`;
    }

    function sendControl() {
      const now = Date.now();
      if (now - lastSendTime < 60) return;
      lastSendTime = now;
      const url = `/control?x=${xValue}&y=${yValue}&e=${emoji}&d=${dance}`;
      fetch(url)
        .then(response => response.text())
        .then(text => { status.textContent = text; })
        .catch(() => { status.textContent = 'Unable to reach robot'; });
      emoji = 0;
      dance = 0;
    }

    function updateValues(clientX, clientY) {
      const rect = joystick.getBoundingClientRect();
      const dx = clientX - (rect.left + rect.width / 2);
      const dy = clientY - (rect.top + rect.height / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      const radius = Math.min(dist, rect.width / 2 - 48);
      const angle = Math.atan2(dy, dx);
      const boundedX = Math.cos(angle) * radius;
      const boundedY = Math.sin(angle) * radius;

      xValue = Math.round(2048 + (boundedX / (rect.width / 2 - 48)) * 2048);
      yValue = Math.round(2048 - (boundedY / (rect.height / 2 - 48)) * 2048);
      xValue = clamp(xValue, 0, 4095);
      yValue = clamp(yValue, 0, 4095);

      setHandle((boundedX / rect.width) * 100 + 50, (boundedY / rect.height) * 100 + 50);
      sendControl();
    }

    function resetJoystick() {
      xValue = 2048;
      yValue = 2048;
      setHandle(50, 50);
      sendControl();
    }

    joystick.addEventListener('pointerdown', e => {
      active = true;
      pointerId = e.pointerId;
      joystick.setPointerCapture(pointerId);
      updateValues(e.clientX, e.clientY);
    });

    joystick.addEventListener('pointermove', e => {
      if (!active || e.pointerId !== pointerId) return;
      updateValues(e.clientX, e.clientY);
    });

    joystick.addEventListener('pointerup', e => {
      if (e.pointerId !== pointerId) return;
      active = false;
      joystick.releasePointerCapture(pointerId);
      resetJoystick();
    });

    emojiBtn.addEventListener('click', () => { emoji = 1; sendControl(); });
    danceBtn.addEventListener('click', () => { dance = 1; sendControl(); });
    setInterval(sendControl, 250);
  </script>
</body>
</html>
